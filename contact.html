<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — IPL Auction</title>
  <meta name="description" content="Contact IPL Auction team." />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏏</text></svg>" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5628134630271944" crossorigin="anonymous"></script>
</head>
<body>
  <header class="header">
    <a class="logo" href="index.html">🏏 IPL Auction</a>
    <a class="btn btn-ghost" href="index.html">Home</a>
  </header>

  <main class="info-page-wrap">
    <section class="info-card fade-in">
      <h1 class="info-title">Contact Us</h1>

      <div class="contact-list">
        <a href="tel:+917622010224">+91 7622010224</a>
        <a href="tel:+919106848980">+91 9106848980</a>
        <a href="mailto:shubhlodaliya@gmail.com">shubhlodaliya@gmail.com</a>
      </div>

      <h2 class="info-subtitle">Send a Message</h2>
      <p class="info-text">Use this form and we will receive your message on email.</p>

      <form class="contact-form" action="https://formsubmit.co/shubhlodaliya@gmail.com" method="POST">
        <input type="hidden" name="_subject" value="IPL Auction Contact Message" />
        <input type="hidden" name="_captcha" value="false" />
        <input type="hidden" name="_template" value="table" />

        <label class="form-label" for="contactName">Name</label>
        <input class="form-input" id="contactName" name="name" type="text" required />

        <label class="form-label" for="contactEmail">Email</label>
        <input class="form-input" id="contactEmail" name="email" type="email" required />

        <label class="form-label" for="contactMessage">Message</label>
        <textarea class="form-input form-textarea" id="contactMessage" name="message" rows="5" required></textarea>

        <button class="btn btn-primary" type="submit">Send Message</button>
      </form>

      <p class="info-text info-note">
        Note: FormSubmit may send a one-time activation email on first use.
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <span>© 2026 IPL Auction</span>
      <nav class="site-footer-links" aria-label="Legal and contact links">
        <a href="about.html">About</a>
        <a href="guide.html">Guide</a>
        <a href="howto.html">How-To</a>
        <a href="faq.html">FAQ</a>
        <a href="contact.html">Contact</a>
        <a href="privacy-policy.html">Privacy Policy</a>
      </nav>
    </div>
  </footer>
</body>
</html>
